# Render.com 배포 설정
# https://render.com → New → Blueprint → 이 저장소 선택하면 아래 설정이 자동 적용됩니다.
#
# 데이터가 JSON 파일(data/db.json)로 저장되므로, 서버가 계속 켜져 있는
# 방식(이 설정처럼 web service)에서만 데이터가 안정적으로 유지됩니다.
# 서버리스(예: Vercel) 배포 시에는 요청 사이에 데이터가 사라질 수 있습니다.
#
# 무료 플랜(plan: free)은 영구 디스크(disk)를 지원하지 않습니다. 이 설정에는
# disk가 빠져 있어 서버 재시작/재배포 시 data/db.json이 시드 상태로 초기화됩니다.
# 데이터를 영구히 유지하려면 plan을 starter 이상으로 올리고 아래 disk 블록을
# 다시 추가하세요:
#   disk:
#     name: showrunner-data
#     mountPath: /opt/render/project/src/data
#     sizeGB: 1
#
# 주의: Render는 모든 웹서비스에 NODE_ENV=production을 자동으로 주입합니다
# (render.yaml에 직접 넣지 않아도 적용됩니다). 이 상태에서 일반 `npm install`은
# devDependencies(tailwindcss, @tailwindcss/postcss 등 빌드에 필요한 패키지)를
# 건너뛰어 빌드가 실패합니다. 그래서 buildCommand에 `--include=dev`를 붙여
# NODE_ENV 값과 무관하게 devDependencies까지 설치하도록 강제합니다.
# (시드 스크립트가 쓰는 tsx는 런타임에도 필요해 dependencies로 옮겨뒀습니다.)

services:
  - type: web
    name: show-running-simulator
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run seed && npm start
    envVars:
      - key: AI_PROVIDER
        value: auto
      - key: APP_SECRET
        generateValue: true   # Render가 배포 시 안전한 무작위 값을 자동 생성 (세션 쿠키 서명용)
      - key: ANTHROPIC_API_KEY
        sync: false   # Render 대시보드에서 직접 입력 (비워두면 Mock 모드로 동작)
